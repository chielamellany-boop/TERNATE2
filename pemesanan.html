<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pemesanan</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <!-- AOS -->
  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css"/>

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #f5f5f5;
    }

    .navbar {
      background: #2563eb;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .menu li {
      display: inline-block;
      margin: 0 10px;
    }

    .menu a {
      color: white;
      text-decoration: none;
    }

    .container {
      padding: 20px;
    }

    .hero {
      text-align: center;
      margin-bottom: 20px;
    }

    /* FORM */
    .mangga-container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 90%;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      background: #2563eb;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 5px;
      margin-top: 15px;
      cursor: pointer;
      width: 100%;
    }

    .footer {
      margin-top: 40px;
      background: #111;
      color: white;
      padding: 20px;
      text-align: center;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <ul class="menu">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="galery.html">Gallery</a></li>
    <li><a href="pemesanan.html">Pemesanan</a></li>
  </ul>
</div>

<!-- HERO -->
<div class="container">
  <div class="hero">
    <h1>Pesan Tiket</h1>
    <p>Isi form di bawah ini</p>
  </div>
</div>

<!-- FORM -->
<div class="mangga-container">
  <h2>Form Pemesanan</h2>

  <form id="form-pemesanan">

    <label>Nama</label>
    <input type="text" id="nama" required>

    <label>Email</label>
    <input type="email" id="email" required>

    <label>Telepon</label>
    <input type="tel" id="telepon" required>

    <label>Tanggal</label>
    <input type="date" id="tanggal" required>

    <label>Jumlah</label>
    <input type="number" id="jumlah" min="1" max="20" value="1">

    <label>Pembayaran</label>
    <input type="radio" name="bayar" value="Transfer"> Transfer
    <input type="radio" name="bayar" value="COD"> COD

    <button type="submit">Pesan</button>
  </form>

  <div id="hasil" style="display:none; margin-top:15px;"></div>
</div>

<!-- FOOTER -->
<div class="footer">
  <p>© 2026 Website Ternate</p>
</div>

<!-- JS -->
<script>
document.getElementById("form-pemesanan").addEventListener("submit", function(e){
  e.preventDefault();

  const nama = document.getElementById("nama").value;
  const email = document.getElementById("email").value;

  document.getElementById("hasil").style.display = "block";
  document.getElementById("hasil").innerHTML = `
    <b>Berhasil!</b><br>
    Nama: ${nama} <br>
    Email: ${email}
  `;
});
</script>

<script src="https://unpkg.com/aos@next/dist/aos.js"></script>
<script>
  AOS.init();
</script>

</body>
</html>
